version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: knowflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-knowflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-knowflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-knowflow} -d ${DB_NAME:-knowflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowflow_net

  redis:
    image: redis:7-alpine
    container_name: knowflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowflow_backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-knowflow}:${DB_PASSWORD}@db:5432/${DB_NAME:-knowflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      SECRET_KEY: ${JWT_SECRET}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-104857600}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8192,https://knowflow.ihope.cc}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - knowflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: knowflow_frontend
    restart: unless-stopped
    ports:
      - "8192:80"
    depends_on:
      - backend
    networks:
      - knowflow_net

volumes:
  pgdata:
    name: knowflow_pgdata
  redis_data:
    name: knowflow_redis_data
  uploads_data:
    name: knowflow_uploads_data

networks:
  knowflow_net:
    name: knowflow_net
    driver: bridge
