user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    client_max_body_size 110m;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ------------------------------------------------------------------
        # Security headers
        # ------------------------------------------------------------------
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ------------------------------------------------------------------
        # API reverse proxy -> backend:8000
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts – generous for file uploads / LLM streaming
            proxy_connect_timeout       60s;
            proxy_send_timeout          300s;
            proxy_read_timeout          300s;

            # Disable buffering for SSE / streaming responses
            proxy_buffering             off;
            proxy_cache                 off;
        }

        # ------------------------------------------------------------------
        # Uploads reverse proxy -> backend:8000
        # ^~ prefix prevents nginx from checking regex locations, so
        # /uploads/*.png|jpg|... are always proxied to the backend and
        # never matched by the static-assets regex block below.
        # ------------------------------------------------------------------
        location ^~ /uploads/ {
            proxy_pass         http://backend:8000/uploads/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  60s;
            proxy_send_timeout     120s;
            proxy_read_timeout     120s;
        }

        # ------------------------------------------------------------------
        # Static assets – long-lived cache (hashed filenames from Vite)
        # ------------------------------------------------------------------
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|svg|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ------------------------------------------------------------------
        # SPA fallback – all other routes served by index.html
        # ------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
        }

        # ------------------------------------------------------------------
        # Health check endpoint (for load-balancers / uptime monitors)
        # ------------------------------------------------------------------
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
